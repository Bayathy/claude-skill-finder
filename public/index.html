<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Skill Finder</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔍</text></svg>"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="header">
      <div>
        <h1>Claude Skill Finder</h1>
        <p class="subtitle">Browse installed Claude skills on your machine</p>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <div class="sidebar-top">
          <label class="search-label" for="search">Search</label>
          <button id="reload" class="reload-button" type="button" title="Rescan skill directories">
            Reload
          </button>
        </div>
        <input
          id="search"
          class="search-input"
          type="search"
          placeholder="Filter by name, description, or path..."
          autocomplete="off"
        />
        <div class="source-filters" id="source-filters"></div>
        <ul class="skill-list" id="skill-list"></ul>
      </aside>

      <section class="detail" id="detail">
        <div class="empty-state">
          <h2>Select a skill</h2>
          <p>Choose a skill from the list to view its contents.</p>
        </div>
      </section>
    </main>

    <script type="module" src="./app.ts"></script>
  </body>
</html>
